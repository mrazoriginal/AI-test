<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome to AI Era</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(-45deg, #0f172a, #111827, #1e293b, #0ea5e9);
      background-size: 400% 400%;
      animation: gradient 12s ease infinite;
      overflow: hidden;
      color: white;
    }

    @keyframes gradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      text-align: center;
      padding: 40px;
      border-radius: 24px;
      backdrop-filter: blur(14px);
      background: rgba(255,255,255,0.08);
      box-shadow: 0 8px 32px rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.12);
    }

    h1 {
      font-size: 4rem;
      margin-bottom: 16px;
      text-shadow: 0 0 20px rgba(255,255,255,0.3);
    }

    p {
      font-size: 1.2rem;
      opacity: 0.85;
    }

    .glow {
      position: absolute;
      width: 500px;
      height: 500px;
      background: rgba(14,165,233,0.2);
      filter: blur(120px);
      border-radius: 50%;
      animation: float 10s ease-in-out infinite alternate;
    }

    @keyframes float {
      from { transform: translate(-100px, -50px); }
      to { transform: translate(100px, 50px); }
    }
  </style>
</head>
<body>
  <div class="glow"></div>

  <div class="container">
    <h1>Welcome to AI Era</h1>
    <p>The future is already here. Humans just wrapped it in subscriptions.</p>
  </div>
</body>
</html>
